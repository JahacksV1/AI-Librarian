services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./sandbox:/sandbox
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3003:80"

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=aijah
      - POSTGRES_PASSWORD=aijah
      - POSTGRES_DB=aijah
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aijah -d aijah"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    mem_limit: 8g
    mem_reservation: 4g
    healthcheck:
      # ollama/ollama image has no curl; use ollama list to check server is ready
      test: ["CMD-SHELL", "ollama list 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  ollama_data:
