services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the .env DATABASE_URL with the Docker-internal service name.
      # The native MCP server uses localhost:5433 (from .env); the backend in Docker uses this.
      - DATABASE_URL=postgresql+asyncpg://aijah:aijah@postgres:5432/aijah
      # MCP server runs natively on the host — not in Docker.
      # host.docker.internal resolves to the host machine from inside any Docker container.
      # On Linux, the extra_hosts entry below makes this hostname available.
      - MCP_URL=http://host.docker.internal:8001/mcp
    extra_hosts:
      # Ensures host.docker.internal works on Linux (automatic on Mac and Windows).
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
        - action: rebuild
          path: ./backend/requirements.txt

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    ports:
      - "3003:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=aijah
      - POSTGRES_PASSWORD=aijah
      - POSTGRES_DB=aijah
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aijah -d aijah"]
      interval: 5s
      timeout: 3s
      retries: 5

  test:
    build: ./backend
    command: ["python", "test_v1.py"]
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - BASE_URL=http://backend:8000
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
    profiles:
      - test

  # Ollama is only needed when MODEL_PROVIDER=ollama.
  # Start with:  docker compose --profile local up
  # Cloud providers (anthropic, openai) don't need this service.
  ollama:
    profiles: ["local"]
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    mem_limit: 8g
    mem_reservation: 4g
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  ollama_data:
