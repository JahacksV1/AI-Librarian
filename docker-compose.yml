services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./sandbox:/sandbox
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    ports:
      - "3003:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=aijah
      - POSTGRES_PASSWORD=aijah
      - POSTGRES_DB=aijah
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aijah -d aijah"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama is only needed when MODEL_PROVIDER=ollama.
  # Start with:  docker compose --profile local up
  # Cloud providers (anthropic, openai) don't need this service.
  ollama:
    profiles: ["local"]
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    mem_limit: 8g
    mem_reservation: 4g
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  ollama_data:
