<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>AIJAH</title>
  </head>
  <body>

    <span id="status-pill" hidden></span>
    <button id="retry-btn" hidden></button>

    <header class="toolbar">
      <div class="toolbar-left">
        <span id="toolbar-status" class="toolbar-status">
          <span id="status-dot" class="status-dot"></span>
          <span id="status-text">Connecting</span>
        </span>
      </div>
      <div class="toolbar-toggles">
        <button class="toggle-btn active" data-target="messages-panel" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Messages
        </button>
        <button class="toggle-btn active" data-target="plan-panel" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
          Plan
        </button>
        <button class="toggle-btn active" data-target="activity-panel" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Activity
        </button>
      </div>
    </header>

    <main class="workspace">
      <div class="panels">
        <section id="messages-panel" class="panel panel-messages">
          <div id="conversation-list" class="conversation-list">
            <div id="messages-empty" class="panel-empty-msg">Type a message below to start organizing your files</div>
          </div>
          <div class="composer">
            <textarea id="composer-input" rows="1" maxlength="2000" placeholder="Describe what you want to organize..."></textarea>
            <button id="composer-send" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </section>

        <div id="divider" class="divider"></div>

        <section id="plan-panel" class="panel panel-plan">
          <div id="plan-root" class="plan-root"></div>
        </section>
      </div>

      <div id="hdivider" class="hdivider"></div>

      <section id="activity-panel" class="panel panel-activity">
        <div id="activity-list" class="activity-list">
          <div id="activity-empty" class="panel-empty-msg">Events will appear here as the agent works</div>
        </div>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
